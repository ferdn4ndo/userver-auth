name: Unit tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
    tags-ignore:
      - '**'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  unit-tests:
    name: Go tests (integration with Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      POSTGRES_USER: postgres
      POSTGRES_PASS: postgres
      POSTGRES_DB: userver_auth_ci
      APP_SECRET_KEY: ci-app-secret-not-for-production-min-32-chars!!
      SYSTEM_CREATION_TOKEN: ci-system-creation-token
      JWT_EXP_DELTA_SECS: '3600'
      JWT_REFRESH_DELTA_SECS: '259200'
      BCRYPT_COST: '4'
      ENV_MODE: development

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Build dev stage from Dockerfile
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build --target dev -t userver-auth:dev .

      - name: Create application database
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq postgresql-client
          for i in $(seq 1 30); do
            PGPASSWORD=postgres psql -h localhost -U postgres -p 5432 -c 'SELECT 1' && break
            sleep 1
          done
          PGPASSWORD=postgres psql -h localhost -U postgres -p 5432 -v ON_ERROR_STOP=1 -c 'CREATE DATABASE userver_auth_ci;'

      - name: Run Go tests (Dockerfile dev stage)
        run: |
          docker run --rm --network host \
            -v "$PWD:/code" -w /code \
            -e POSTGRES_HOST="$POSTGRES_HOST" \
            -e POSTGRES_PORT="$POSTGRES_PORT" \
            -e POSTGRES_USER="$POSTGRES_USER" \
            -e POSTGRES_PASS="$POSTGRES_PASS" \
            -e POSTGRES_DB="$POSTGRES_DB" \
            -e APP_SECRET_KEY="$APP_SECRET_KEY" \
            -e SYSTEM_CREATION_TOKEN="$SYSTEM_CREATION_TOKEN" \
            -e JWT_EXP_DELTA_SECS="$JWT_EXP_DELTA_SECS" \
            -e JWT_REFRESH_DELTA_SECS="$JWT_REFRESH_DELTA_SECS" \
            -e BCRYPT_COST="$BCRYPT_COST" \
            -e ENV_MODE="$ENV_MODE" \
            userver-auth:dev \
            bash -c 'go mod download && go test ./... -count=1 -v'
