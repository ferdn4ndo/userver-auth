services:
  userver-auth:
    container_name: userver-auth
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /code
    command: ["/bin/bash", "./entrypoint.sh"]
    volumes:
      - ./:/code
    env_file:
      - .env
    # Defaults match the release image (/app/main). For bind-mount dev, set in .env:
    # MIGRATE_BIN=./out/userver-auth and APP_BIN=./out/userver-auth
    environment:
      MIGRATE_BIN: ${MIGRATE_BIN:-/app/main}
      APP_BIN: ${APP_BIN:-/app/main}

networks:
  default:
    name: nginx-proxy
    external: true
